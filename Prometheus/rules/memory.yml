groups:
- name: MemoryAlerts
  rules:
  - alert: HighMemoryUsage
    expr: 100 * (1 - (node_memory_MemFree_bytes + node_memory_Buffers_bytes + node_memory_Cached_bytes) / node_memory_MemTotal_bytes) > 80
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: "实例 {{ $labels.instance }} 内存使用率过高"
      description: "实例 {{ $labels.instance }} 内存使用率已超过 80% (当前值: {{ $value }}%)"
